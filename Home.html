<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RideFix Premium Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; -webkit-user-select: none; user-select: none; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }
        
        #main-content { transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1); }
        .blur-content { filter: blur(25px) brightness(0.7); transform: scale(0.96); pointer-events: none; }

        .ios-header { 
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 75%, transparent 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        
        .header-text { color: white; }
        .search-bg { background: rgba(255, 255, 255, 0.12) !important; color: white; border: 0.5px solid rgba(255,255,255,0.2); }
        .search-bg::placeholder { color: rgba(255,255,255,0.5); }

        .logo-font { font-weight: 900; letter-spacing: -0.06em; }
        @keyframes reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .support-btn { background: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .swiper-pagination-bullet {
            background: white !important;
            opacity: 0.5;
            width: 5px;
            height: 5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .swiper-pagination-bullet-active {
            opacity: 1;
            width: 18px;
            border-radius: 10px;
            background: #10b981 !important;
        }
        
        .banner-overlay {
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
      import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
      import { Swiper } from 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs'

      const firebaseConfig = {
        apiKey: "AIzaSyDyAqz5_6-i7xIlPAdMUBhdVCZwV262Prw",
        authDomain: "ridefix-final.firebaseapp.com",
        projectId: "ridefix-final",
        storageBucket: "ridefix-final.firebasestorage.app",
        messagingSenderId: "175554582400",
        appId: "1:175554582400:web:f40c9b80354d6963ab1365",
        measurementId: "G-EMCTJE6773"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      let swiperInstance = null;

      // Banner Sync Logic
      onSnapshot(collection(db, "banners"), (snap) => {
          const wrapper = document.getElementById("banner-wrapper");
          wrapper.innerHTML = "";
          let slideCount = 0;
          
          if(!snap.empty) {
              snap.forEach(doc => {
                  wrapper.innerHTML += `
                    <div class="swiper-slide aspect-[16/9] relative">
                        <img src="${doc.data().image}">
                        <div class="absolute inset-0 banner-overlay"></div>
                    </div>`;
                  slideCount++;
              });
          }

          if (swiperInstance) swiperInstance.destroy(true, true);

          swiperInstance = new Swiper('.mySwiper', {
              loop: slideCount > 1, 
              autoplay: slideCount > 1 ? { 
                  delay: 2000, 
                  disableOnInteraction: false 
              } : false,
              speed: 800,
              pagination: { el: '.swiper-pagination', clickable: true },
              effect: 'fade',
              fadeEffect: { crossFade: true },
              observer: true,
              observeParents: true
          });
      });

      // --- Updated Location Tracking Logic (Village, Taluka, State) ---
      window.updateLocation = function() {
          const locationText = document.querySelector('[data-i18n="location_finding"]');
          if (navigator.geolocation) {
              navigator.geolocation.getCurrentPosition(
                  async (position) => {
                      try {
                          const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}`);
                          const data = await res.json();
                          const addr = data.address;
                          
                          const village = addr.village || addr.suburb || addr.town || addr.city || "";
                          const taluka = addr.county || addr.state_district || "";
                          const state = addr.state || "Maharashtra";

                          const displayAddress = `${village}${village && taluka ? ', ' : ''}${taluka}${taluka && state ? ', ' : ''}${state}`;
                          
                          locationText.innerText = displayAddress;
                          locationText.removeAttribute('data-i18n'); 
                      } catch (e) {
                          locationText.innerText = "Location Detected";
                      }
                  },
                  () => { locationText.innerText = "Access Denied"; }
              );
          }
      };

      // Language Logic
      const translations = {
          en: { live_label: "Live Location", location_finding: "Finding Location...", services_title: "Our Services", search_placeholder: "Search services...", nav_home: "Home", nav_book: "Bookings", nav_support: "Support", nav_history: "History", nav_profile: "Profile" },
          mr: { live_label: "लाईव्ह लोकेशन", location_finding: "शोधत आहे...", services_title: "आमच्या सेवा", search_placeholder: "सेवा शोधा...", nav_home: "होम", nav_book: "बुकिंग", nav_support: "सपोर्ट", nav_history: "हिस्ट्री", nav_profile: "प्रोफाईल" },
          hi: { live_label: "लाइव लोकेशन", location_finding: "खोज रहे हैं...", services_title: "हमारी सेवाएं", search_placeholder: "सेवा खोजें...", nav_home: "होम", nav_book: "बुकिंग", nav_support: "सपोर्ट", nav_history: "इतिहास", nav_profile: "प्रोफ़ाइल" }
      };

      window.changeLanguage = function(lang) {
          const t = translations[lang];
          document.querySelectorAll("[data-i18n]").forEach(el => {
              const key = el.getAttribute("data-i18n");
              if (el.tagName === "INPUT") el.placeholder = t[key];
              else el.innerText = t[key];
          });
          document.getElementById("lang-menu").classList.add("hidden");
          document.documentElement.lang = lang;
      };

      let allServices = []; 
      onSnapshot(collection(db, "services"), (snapshot) => {
          allServices = [];
          snapshot.forEach((doc) => { allServices.push(doc.data()); });
          renderServices(allServices);
      });

      window.renderServices = function(services) {
          const grid = document.getElementById("services-grid");
          grid.innerHTML = ""; 
          services.forEach((s, index) => {
              grid.innerHTML += `
                <div style="animation: reveal 0.5s cubic-bezier(0, 0.5, 0.5, 1) ${index * 0.05}s forwards; opacity: 0;" 
                     class="bg-white rounded-[2.2rem] border border-slate-100 p-2 shadow-sm active:scale-95 transition-all overflow-hidden">
                    <div class="w-full h-[125px] overflow-hidden rounded-[1.8rem] bg-slate-50">
                        <img src="${s.image}" class="w-full h-full object-cover">
                    </div>
                    <p class="text-center font-bold text-[13px] py-4 text-slate-800 tracking-tight">${s.name}</p>
                </div>`;
          });
      };

      window.handleSearch = function(query) {
          const mainContent = document.getElementById("main-content");
          const searchBox = document.getElementById("floating-search-results");
          if (query.trim().length > 0) {
              mainContent.classList.add("blur-content");
              searchBox.classList.remove("hidden");
              searchBox.innerHTML = "";
              allServices.filter(s => s.name.toLowerCase().includes(query.toLowerCase())).forEach((s, i) => {
                  searchBox.innerHTML += `
                    <div style="animation: reveal 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) ${i * 0.04}s both" class="bg-white/80 backdrop-blur-xl flex items-center gap-4 p-4 mb-3 rounded-3xl border border-white/40">
                        <img src="${s.image}" class="w-12 h-12 rounded-[1rem] object-cover">
                        <div class="flex-1">
                            <p class="font-black text-slate-900 text-[15px] leading-tight">${s.name}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-0.5 tracking-wider">Ridefix Service</p>
                        </div>
                    </div>`;
              });
          } else {
              mainContent.classList.remove("blur-content");
              searchBox.classList.add("hidden");
          }
      };

      window.addEventListener('load', updateLocation);
    </script>
</head>
<body class="antialiased">

    <div class="max-w-[450px] mx-auto bg-white min-h-screen shadow-2xl relative">
        
        <div class="ios-header p-6 fixed top-0 left-0 right-0 z-[1000] max-w-[450px] mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col">
                    <h1 class="text-3xl logo-font header-text leading-none mb-1.5">Ride<span class="text-emerald-500">Fix</span></h1>
                    <div class="flex items-center gap-1.5">
                        <div class="flex items-center justify-center bg-emerald-500 p-1 rounded-md shadow-sm">
                           <i data-lucide="navigation" class="w-2.5 h-2.5 text-white fill-white"></i>
                        </div>
                        <span data-i18n="live_label" class="text-[11px] font-black text-white/70 uppercase tracking-tighter">Live‎ ‎ ‎ ‎ Location</span>
                        <p data-i18n="location_finding" class="text-emerald-400 text-[11px] font-black truncate w-32">Finding Location...</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2.5 relative">
                    <button onclick="document.getElementById('lang-menu').classList.toggle('hidden')" class="w-11 h-11 flex items-center justify-center bg-white/10 rounded-full border border-white/20 active:scale-90 transition z-[3001]">
                        <i data-lucide="globe" class="w-5 h-5 text-white"></i>
                    </button>
                    <div id="lang-menu" class="hidden absolute top-full right-0 mt-3 bg-black/90 backdrop-blur-2xl border border-white/10 shadow-2xl rounded-[2rem] w-40 p-2 z-[3002]">
                        <button onclick="changeLanguage('mr')" class="w-full text-left px-5 py-3 hover:bg-white/10 rounded-2xl text-[13px] font-black text-white">मराठी</button>
                        <button onclick="changeLanguage('hi')" class="w-full text-left px-5 py-3 hover:bg-white/10 rounded-2xl text-[13px] font-black text-white">हिंदी</button>
                        <button onclick="changeLanguage('en')" class="w-full text-left px-5 py-3 hover:bg-white/10 rounded-2xl text-[13px] font-black text-white">English</button>
                    </div>
                    <button class="w-11 h-11 flex items-center justify-center bg-white/10 rounded-full border border-white/20">
                        <i data-lucide="bell" class="w-5 h-5 text-white"></i>
                    </button>
                </div>
            </div>
            
            <div class="relative z-[1100]">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40"></i>
                <input type="text" data-i18n="search_placeholder" oninput="handleSearch(this.value)" placeholder="Search services..." class="w-full search-bg py-4 pl-12 pr-4 rounded-[1.4rem] outline-none text-[16px] font-semibold transition-all">
            </div>
            <div id="floating-search-results" class="hidden absolute left-6 right-6 top-full mt-6 z-[2000]"></div>
        </div>

        <div id="main-content">
            <div class="relative w-full pt-[185px] bg-black">
                <div class="swiper mySwiper w-full">
                    <div class="swiper-wrapper" id="banner-wrapper"></div>
                    <div class="swiper-pagination !bottom-4"></div>
                </div>
            </div>

            <div class="bg-[#f2f2f7] -mt-6 relative z-20 rounded-t-[2.5rem] pt-10 px-6 pb-32">
                <h3 data-i18n="services_title" class="font-black text-2xl text-black mb-6">Our Services</h3>
                <div id="services-grid" class="grid grid-cols-2 gap-5"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-[450px] mx-auto bg-white/70 backdrop-blur-3xl border-t border-slate-100/50 px-8 py-6 flex justify-between items-center z-[1500] rounded-t-[2.8rem]">
            <div class="flex flex-col items-center text-black"><i data-lucide="home" class="w-6 h-6 stroke-[2.5px]"></i><span data-i18n="nav_home" class="text-[10px] font-black mt-1 uppercase">Home</span></div>
            <div class="flex flex-col items-center text-slate-400"><i data-lucide="calendar" class="w-6 h-6"></i><span data-i18n="nav_book" class="text-[10px] font-bold mt-1 uppercase">Bookings</span></div>
            <div class="flex flex-col items-center text-slate-400"><div class="support-btn w-12 h-12 rounded-2xl flex items-center justify-center -mt-12 mb-1 border-4 border-[#f2f2f7]"><i data-lucide="headset" class="w-6 h-6 text-white stroke-[2.5px]"></i></div><span data-i18n="nav_support" class="text-[10px] font-bold uppercase">Support</span></div>
            <div class="flex flex-col items-center text-slate-400"><i data-lucide="history" class="w-6 h-6"></i><span data-i18n="nav_history" class="text-[10px] font-bold mt-1 uppercase">History</span></div>
            <div class="flex flex-col items-center text-slate-400"><i data-lucide="user" class="w-6 h-6"></i><span data-i18n="nav_profile" class="text-[10px] font-bold mt-1 uppercase">Profile</span></div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
