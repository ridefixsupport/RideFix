<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RideFix Premium Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
      import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDyAqz5_6-i7xIlPAdMUBhdVCZwV262Prw",
        authDomain: "ridefix-final.firebaseapp.com",
        projectId: "ridefix-final",
        storageBucket: "ridefix-final.firebasestorage.app",
        messagingSenderId: "175554582400",
        appId: "1:175554582400:web:f40c9b80354d6963ab1365",
        measurementId: "G-EMCTJE6773"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const translations = {
          en: {
              live_label: "Live Location", location_finding: "Finding...", banner_title: "Get 25% OFF", banner_sub: "On today's booking",
              services_title: "Our Services", search_placeholder: "Search services...",
              nav_home: "Home", nav_book: "Bookings", nav_support: "Support", nav_history: "History", nav_profile: "Profile"
          },
          mr: {
              live_label: "लाईव्ह लोकेशन", location_finding: "शोधत आहे...", banner_title: "मिळवा 25% सूट", banner_sub: "आजच्या बुकिंगवर",
              services_title: "आमच्या सेवा", search_placeholder: "सेवा शोधा...",
              nav_home: "होम", nav_book: "बुकिंग", nav_support: "सपोर्ट", nav_history: "हिस्ट्री", nav_profile: "प्रोफाईल"
          },
          hi: {
              live_label: "लाइव लोकेशन", location_finding: "खोज रहे हैं...", banner_title: "पाएं 25% छूट", banner_sub: "आज की बुकिंग पर",
              services_title: "हमारी सेवाएं", search_placeholder: "सेवा खोजें...",
              nav_home: "होम", nav_book: "बुकिंग", nav_support: "सपोर्ट", nav_history: "इतिहास", nav_profile: "प्रोफ़ाइल"
          }
      };

      window.changeLanguage = function(lang) {
          const t = translations[lang];
          document.querySelectorAll("[data-i18n]").forEach(el => {
              const key = el.getAttribute("data-i18n");
              if (el.tagName === "INPUT") el.placeholder = t[key];
              else el.innerText = t[key];
          });
          document.getElementById("lang-menu").classList.add("hidden");
          document.documentElement.lang = lang;
      };

      let allServices = []; 
      onSnapshot(collection(db, "services"), (snapshot) => {
          allServices = [];
          snapshot.forEach((doc) => { allServices.push(doc.data()); });
          renderServices(allServices);
      });

      window.renderServices = function(services) {
          const grid = document.getElementById("services-grid");
          grid.innerHTML = ""; 
          services.forEach((s, index) => {
              grid.innerHTML += `
                <div style="animation: reveal 0.5s cubic-bezier(0, 0.5, 0.5, 1) ${index * 0.05}s forwards; opacity: 0;" 
                     class="bg-white rounded-[2.2rem] border border-slate-100 p-2 shadow-sm active:scale-95 transition-all overflow-hidden">
                    <div class="w-full h-[125px] overflow-hidden rounded-[1.8rem] bg-slate-50">
                        <img src="${s.image}" class="w-full h-full object-cover">
                    </div>
                    <p class="text-center font-bold text-[13px] py-4 text-slate-800 tracking-tight">${s.name}</p>
                </div>`;
          });
      };

      window.handleSearch = function(query) {
          const mainContent = document.getElementById("main-content");
          const searchBox = document.getElementById("floating-search-results");
          if (query.trim().length > 0) {
              const filtered = allServices.filter(s => s.name.toLowerCase().includes(query.toLowerCase()));
              mainContent.style.filter = "blur(30px) brightness(0.8)"; 
              searchBox.classList.remove("hidden");
              searchBox.innerHTML = "";
              filtered.forEach((s) => {
                  searchBox.innerHTML += `
                    <div class="ios-notification flex items-center gap-4 p-4 mb-3">
                        <img src="${s.image}" class="w-12 h-12 rounded-[1rem] object-cover">
                        <div class="flex-1">
                            <p class="font-black text-slate-900 text-[15px] leading-tight">${s.name}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-0.5 tracking-wider">Ridefix Service</p>
                        </div>
                    </div>`;
              });
          } else {
              mainContent.style.filter = "none";
              searchBox.classList.add("hidden");
          }
      };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f2f2f7; -webkit-user-select: none; user-select: none; }
        ::-webkit-scrollbar { display: none; }
        .ios-header { background: rgba(242, 242, 247, 0.8); backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%); }
        .ios-notification { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%); border-radius: 2rem; border: 0.5px solid rgba(255,255,255,0.4); }
        .logo-font { font-weight: 900; letter-spacing: -0.06em; }
        @keyframes reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .support-btn {
            background: #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-[450px] mx-auto bg-[#f2f2f7] min-h-screen pb-32 shadow-2xl relative">
        
        <div class="ios-header p-6 sticky top-0 z-[1000]">
            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col">
                    <h1 class="text-3xl logo-font text-black leading-none mb-1.5">Ride<span class="text-emerald-500">Fix</span></h1>
                    <div class="flex items-center gap-1.5">
                        <div class="flex items-center justify-center bg-emerald-500 p-1 rounded-md shadow-sm">
                           <i data-lucide="navigation" class="w-2.5 h-2.5 text-white fill-white"></i>
                        </div>
                        <span data-i18n="live_label" class="text-[11px] font-black text-slate-500 uppercase tracking-tighter">Live Location</span>
                        <span class="text-slate-300 mx-0.5">•</span>
                        <p id="location-text" data-i18n="location_finding" class="text-emerald-600 text-[11px] font-black truncate w-32">Finding...</p>
                    </div>
                </div>

                <div class="flex items-center gap-2.5 relative">
                    <button onclick="document.getElementById('lang-menu').classList.toggle('hidden')" class="w-11 h-11 flex items-center justify-center bg-white/60 rounded-full border border-white active:scale-90 transition z-[3001]">
                        <i data-lucide="globe" class="w-5 h-5 text-slate-800"></i>
                    </button>
                    
                    <div id="lang-menu" class="hidden absolute top-full right-0 mt-3 bg-white/95 backdrop-blur-2xl border border-white shadow-2xl rounded-[2rem] w-40 p-2 z-[3002]">
                        <button onclick="changeLanguage('mr')" class="w-full text-left px-5 py-3 hover:bg-emerald-50 rounded-2xl text-[13px] font-black">मराठी</button>
                        <button onclick="changeLanguage('en')" class="w-full text-left px-5 py-3 hover:bg-emerald-50 rounded-2xl text-[13px] font-black">English</button>
                        <button onclick="changeLanguage('hi')" class="w-full text-left px-5 py-3 hover:bg-emerald-50 rounded-2xl text-[13px] font-black">हिंदी</button>
                    </div>

                    <button class="w-11 h-11 flex items-center justify-center bg-white/60 rounded-full border border-white">
                        <i data-lucide="bell" class="w-5 h-5 text-slate-800"></i>
                    </button>
                </div>
            </div>
            
            <div class="relative z-[900]">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input type="text" data-i18n="search_placeholder" oninput="handleSearch(this.value)" placeholder="Search services..." class="w-full bg-slate-300/30 py-4 pl-12 pr-4 rounded-[1.4rem] outline-none text-[16px] font-semibold border border-transparent focus:bg-white transition-all">
            </div>
            
            <div id="floating-search-results" class="hidden absolute left-6 right-6 top-full mt-6 z-[2000]"></div>
        </div>

        <div id="main-content">
            <div class="px-6 mt-4">
                <div class="h-48 bg-slate-900 rounded-[2.8rem] p-8 text-white relative overflow-hidden shadow-2xl">
                    <h2 data-i18n="banner_title" class="text-3xl font-black leading-tight">Get 25% OFF</h2>
                    <p data-i18n="banner_sub" class="text-emerald-400 text-sm font-bold mt-1 uppercase tracking-widest">On today's booking</p>
                    <div class="absolute -right-20 -top-20 w-64 h-64 bg-emerald-500/10 rounded-full blur-[80px]"></div>
                </div>
            </div>

            <div class="px-6 mt-10">
                <h3 data-i18n="services_title" class="font-black text-2xl text-black mb-6">Our Services</h3>
                <div id="services-grid" class="grid grid-cols-2 gap-5"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-[450px] mx-auto bg-white/70 backdrop-blur-3xl border-t border-slate-100/50 px-8 py-6 flex justify-between items-center z-[1500] rounded-t-[2.8rem]">
            <div class="flex flex-col items-center text-black">
                <i data-lucide="home" class="w-6 h-6 stroke-[2.5px]"></i>
                <span data-i18n="nav_home" class="text-[10px] font-black mt-1 uppercase">Home</span>
            </div>
            <div class="flex flex-col items-center text-slate-400">
                <i data-lucide="calendar" class="w-6 h-6"></i>
                <span data-i18n="nav_book" class="text-[10px] font-bold mt-1 uppercase">Bookings</span>
            </div>
            
            <div class="flex flex-col items-center text-slate-400">
                <div class="support-btn w-12 h-12 rounded-2xl flex items-center justify-center -mt-12 mb-1 border-4 border-[#f2f2f7]">
                    <i data-lucide="headset" class="w-6 h-6 text-white stroke-[2.5px]"></i>
                </div>
                <span data-i18n="nav_support" class="text-[10px] font-bold uppercase tracking-tighter">Support</span>
            </div>

            <div class="flex flex-col items-center text-slate-400">
                <i data-lucide="history" class="w-6 h-6"></i>
                <span data-i18n="nav_history" class="text-[10px] font-bold mt-1 uppercase">History</span>
            </div>
            <div class="flex flex-col items-center text-slate-400">
                <i data-lucide="user" class="w-6 h-6"></i>
                <span data-i18n="nav_profile" class="text-[10px] font-bold mt-1 uppercase">Profile</span>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function initApp() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                    fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`)
                    .then(r => r.json()).then(data => {
                        const village = data.address.village || data.address.town || data.address.suburb || "Area Found";
                        const locEl = document.getElementById("location-text");
                        locEl.removeAttribute("data-i18n");
                        locEl.innerText = village;
                        if(window.saveVisitToFirebase) window.saveVisitToFirebase(village, lat, lon, data.display_name);
                    });
                }, null, {enableHighAccuracy:true});
            }
        }
        window.onload = () => {
            changeLanguage('en'); // Set default to English
            setTimeout(initApp, 1000);
        };
    </script>
</body>
</html>
