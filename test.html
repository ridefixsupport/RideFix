<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>RideFix AI</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-2xl bg-zinc-900 rounded-3xl overflow-hidden border border-green-500 shadow-2xl">

  <!-- Header -->
  <div class="bg-gradient-to-r from-green-500 to-emerald-700 p-5">

    <h1 class="text-3xl text-white font-bold">
      RideFix AI
    </h1>

    <p class="text-white/80">
      Free AI Bike Support
    </p>

  </div>

  <!-- Chat -->
  <div
    id="chatBox"
    class="h-[500px] overflow-y-auto p-5 space-y-4 bg-black"
  >

    <div class="bg-zinc-800 text-white p-3 rounded-2xl max-w-[80%] w-fit">
      Hello 👋 Welcome to RideFix AI Support.
    </div>

  </div>

  <!-- Input -->
  <div class="p-4 bg-zinc-900 flex gap-3 border-t border-zinc-700">

    <input
      type="text"
      id="userInput"
      placeholder="Ask your bike issue..."
      class="flex-1 bg-zinc-800 text-white border border-zinc-700 rounded-2xl px-4 py-3 outline-none focus:border-green-500"
    >

    <button
      onclick="sendMessage()"
      class="bg-green-500 hover:bg-green-600 text-white px-6 rounded-2xl font-bold"
    >
      Send
    </button>

  </div>

</div>

<script>

// Paste your Hugging Face token here
const HF_TOKEN = "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";

async function sendMessage() {

  const input = document.getElementById("userInput");
  const chatBox = document.getElementById("chatBox");

  const message = input.value.trim();

  if(message === "") return;

  // User Message
  const userDiv = document.createElement("div");

  userDiv.className =
    "bg-green-600 text-white p-3 rounded-2xl ml-auto max-w-[80%] w-fit";

  userDiv.innerText = message;

  chatBox.appendChild(userDiv);

  input.value = "";

  // Loading
  const loading = document.createElement("div");

  loading.className =
    "bg-zinc-800 text-white p-3 rounded-2xl max-w-[80%] w-fit";

  loading.innerText = "Typing...";

  chatBox.appendChild(loading);

  chatBox.scrollTop = chatBox.scrollHeight;

  try {

    const response = await fetch(
      "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2",
      {
        method: "POST",

        headers: {
          "Authorization": "Bearer " + HF_TOKEN,
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          inputs: "<s>[INST] You are RideFix AI support assistant. Reply shortly and helpfully. User: " + message + " [/INST]"
        })
      }
    );

    const data = await response.json();

    console.log(data);

    loading.remove();

    let reply = "No response from AI";

    // Extract Reply
    if(Array.isArray(data)) {

      if(data[0].generated_text) {

        reply = data[0].generated_text;

        // Clean Output
        reply = reply.replace(
          "<s>[INST] You are RideFix AI support assistant. Reply shortly and helpfully. User: " + message + " [/INST]",
          ""
        );

      }

    } else if(data.error) {

      reply = data.error;
    }

    // AI Reply
    const botDiv = document.createElement("div");

    botDiv.className =
      "bg-zinc-800 text-white p-3 rounded-2xl max-w-[80%] w-fit";

    botDiv.innerText = reply;

    chatBox.appendChild(botDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

  } catch(error) {

    console.log(error);

    loading.innerText = "Error connecting AI";
  }
}

</script>

</body>
</html>
