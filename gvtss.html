<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RideFix - Pro Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; user-select: none; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }
        .ios-header { background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 80%, transparent 100%); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .logo-font { font-weight: 900; letter-spacing: -0.05em; }
        .search-bg { background: rgba(255, 255, 255, 0.1) !important; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .search-bg::placeholder { color: rgba(255,255,255,0.4); }
        .banner-card { border-radius: 2.2rem; overflow: hidden; transform: translateZ(0); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .service-card { animation: fadeIn 0.4s ease-out forwards; }
    </style>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
      import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
      import { Swiper } from 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs'

      const firebaseConfig = {
        apiKey: "AIzaSyDyAqz5_6-i7xIlPAdMUBhdVCZwV262Prw",
        authDomain: "ridefix-final.firebaseapp.com",
        projectId: "ridefix-final",
        storageBucket: "ridefix-final.firebasestorage.app",
        messagingSenderId: "175554582400",
        appId: "1:175554582400:web:f40c9b80354d6963ab1365"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      let swiperInstance = null;

      // --- Language Logic ---
      const translations = {
          mr: { live_location: "लाईव्ह लोकेशन", searching: "GPS शोधत आहे...", services: "आमच्या सेवा", search_placeholder: "सेवा शोधा...", home: "होम", bookings: "बुकिंग", support: "सपोर्ट", history: "इतिहास", profile: "प्रोफाइल" },
          en: { live_location: "Live Location", searching: "Connecting GPS...", services: "Our Services", search_placeholder: "Search services...", home: "Home", bookings: "Bookings", support: "Support", history: "History", profile: "Profile" }
      };

      let currentLang = localStorage.getItem('lang') || 'mr';

      window.toggleLanguage = function() {
          currentLang = currentLang === 'mr' ? 'en' : 'mr';
          localStorage.setItem('lang', currentLang);
          applyTranslations();
          updateLocation();
      };

      function applyTranslations() {
          const t = translations[currentLang];
          document.querySelectorAll('[data-i18n]').forEach(el => {
              const key = el.getAttribute('data-i18n');
              if (t[key]) el.innerText = t[key];
          });
          const searchInput = document.querySelector('input[type="text"]');
          if (searchInput) searchInput.placeholder = t.search_placeholder;
      }

      // --- Pure Swiggy-Style GPS Logic ---
      window.updateLocation = function() {
          const locationText = document.getElementById('location-display');
          const GOOGLE_API_KEY = "AIzaSyClcel-N682oF2GZYT6UBcJ_NofMy1rTRA"; 

          if (!locationText) return;
          locationText.innerText = translations[currentLang].searching;

          const options = {
              enableHighAccuracy: true, // सक्तीने GPS वापरण्यासाठी
              timeout: 15000,
              maximumAge: 0
          };

          // watchPosition मुळे युजर हलला की लोकेशन आपोआप बदलेल
          navigator.geolocation.watchPosition(async (position) => {
              const { latitude, longitude } = position.coords;
              try {
                  const res = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${latitude},${longitude}&key=${GOOGLE_API_KEY}&language=${currentLang}`);
                  const data = await res.json();
                  if (data.status === "OK") {
                      const components = data.results[0].address_components;
                      let village = "", area = "", taluka = "";

                      components.forEach(c => {
                          if (c.types.includes("sublocality")) area = c.long_name;
                          if (c.types.includes("locality")) village = c.long_name;
                          if (c.types.includes("administrative_area_level_3")) taluka = c.long_name;
                      });

                      let display = area ? `${area}, ${village || taluka}` : (village || taluka || "दहिवेल परिसर");
                      locationText.innerText = display;
                  }
              } catch (e) {
                  console.error("GPS Error");
              }
          }, (err) => {
              if(err.code === 1) locationText.innerText = "GPS Permission Denied";
              else locationText.innerText = "GPS Signal Weak";
          }, options);
      };

      // Realtime Banners
      onSnapshot(collection(db, "banners"), (snap) => {
          const wrapper = document.getElementById("banner-wrapper");
          wrapper.innerHTML = "";
          snap.forEach(doc => {
              wrapper.innerHTML += `
                <div class="swiper-slide banner-card relative aspect-[16/9]">
                    <img src="${doc.data().image}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
                </div>`;
          });
          if (swiperInstance) swiperInstance.destroy(true, true);
          swiperInstance = new Swiper('.mySwiper', {
              loop: true, autoplay: { delay: 3000 },
              pagination: { el: '.swiper-pagination', clickable: true },
              spaceBetween: 12
          });
      });

      // Realtime Services
      let allServices = [];
      onSnapshot(collection(db, "services"), (snapshot) => {
          const grid = document.getElementById("services-grid");
          grid.innerHTML = "";
          allServices = [];
          snapshot.forEach((doc, index) => {
              const s = doc.data();
              allServices.push(s);
              grid.innerHTML += `
                <div class="service-card bg-white rounded-[2rem] p-2 shadow-sm border border-slate-100 active:scale-95 transition-all">
                    <div class="w-full h-[120px] overflow-hidden rounded-[1.6rem] bg-slate-100">
                        <img src="${s.image}" class="w-full h-full object-cover">
                    </div>
                    <p class="text-center font-bold text-[13px] py-4 text-slate-800 tracking-tight">${s.name}</p>
                </div>`;
          });
      });

      window.addEventListener('load', () => {
          applyTranslations();
          updateLocation();
          setTimeout(() => lucide.createIcons(), 500);
      });
    </script>
</head>
<body class="antialiased">
    <div class="max-w-[450px] mx-auto bg-white min-h-screen relative shadow-2xl">
        
        <div class="ios-header p-6 fixed top-0 left-0 right-0 z-[1000] max-w-[450px] mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col flex-1">
                    <h1 class="text-3xl logo-font text-white leading-none mb-2">Ride<span class="text-emerald-500">Fix</span></h1>
                    <div class="flex items-center gap-2" onclick="updateLocation()">
                        <div class="bg-emerald-500 p-1 rounded-md shadow-lg shadow-emerald-500/30">
                            <i data-lucide="navigation" class="w-3 h-3 text-white fill-white"></i>
                        </div>
                        <div class="flex flex-col">
                            <span data-i18n="live_location" class="text-[9px] font-black text-white/40 uppercase tracking-widest">लाईव्ह लोकेशन</span>
                            <p id="location-display" class="text-emerald-400 text-[11px] font-bold leading-tight">शोधत आहे...</p>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleLanguage()" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-full border border-white/20 active:scale-90 transition-transform">
                        <i data-lucide="globe" class="w-5 h-5 text-white"></i>
                    </button>
                    <button class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-full border border-white/20">
                        <i data-lucide="bell" class="w-5 h-5 text-white"></i>
                    </button>
                </div>
            </div>
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40"></i>
                <input type="text" placeholder="सेवा शोधा..." class="w-full search-bg py-4 pl-12 pr-4 rounded-2xl outline-none text-[15px] font-semibold">
            </div>
        </div>

        <div class="pt-[195px] pb-32">
            <div class="px-5 mb-8">
                <div class="swiper mySwiper w-full h-[200px] rounded-[2.5rem] shadow-xl shadow-black/10">
                    <div class="swiper-wrapper" id="banner-wrapper"></div>
                    <div class="swiper-pagination !bottom-4"></div>
                </div>
            </div>

            <div class="bg-[#f8f9fc] rounded-t-[2.8rem] px-6 pt-10 min-h-[500px] shadow-[0_-20px_50px_rgba(0,0,0,0.04)]">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h3 data-i18n="services" class="font-black text-xl text-zinc-900 tracking-tight">आमच्या सेवा</h3>
                    <i data-lucide="layout-grid" class="w-5 h-5 text-slate-400"></i>
                </div>
                <div id="services-grid" class="grid grid-cols-2 gap-5">
                    </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-[450px] mx-auto bg-white/80 backdrop-blur-3xl border-t border-slate-100/50 px-8 py-6 flex justify-between items-center z-[1500] rounded-t-[2.8rem]">
            <div class="flex flex-col items-center text-emerald-600">
                <i data-lucide="home" class="w-6 h-6 stroke-[2.5px]"></i>
                <span data-i18n="home" class="text-[9px] font-black mt-1 uppercase">होम</span>
            </div>
            <div class="flex flex-col items-center text-slate-400">
                <i data-lucide="calendar" class="w-6 h-6"></i>
                <span data-i18n="bookings" class="text-[9px] font-bold mt-1 uppercase">बुकिंग</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="bg-zinc-900 w-14 h-14 rounded-2xl flex items-center justify-center -mt-14 border-[6px] border-[#f8f9fc] shadow-xl active:scale-90 transition-transform">
                    <i data-lucide="headset" class="w-6 h-6 text-white stroke-[2.5px]"></i>
                </div>
                <span data-i18n="support" class="text-[9px] font-bold mt-1 uppercase">सपोर्ट</span>
            </div>
            <div class="flex flex-col items-center text-slate-400">
                <i data-lucide="history" class="w-6 h-6"></i>
                <span data-i18n="history" class="text-[9px] font-bold mt-1 uppercase">इतिहास</span>
            </div>
            <div class="flex flex-col items-center text-slate-400">
                <i data-lucide="user" class="w-6 h-6"></i>
                <span data-i18n="profile" class="text-[9px] font-bold mt-1 uppercase">प्रोफाइल</span>
            </div>
        </div>
    </div>
    <script>
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
