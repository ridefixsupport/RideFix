<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RideFix Premium Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; -webkit-user-select: none; user-select: none; overflow-x: hidden; -webkit-touch-callout: none !important; }
        ::-webkit-scrollbar { display: none; }
        img { pointer-events: none; -webkit-user-drag: none; }
        #main-content { transition: all 0.5s ease; }
        .blur-content { filter: blur(20px) brightness(0.6); transform: scale(0.97); pointer-events: none; }
        .ios-header { background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 75%, transparent 100%); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }

        #chat-window {
            position: fixed; bottom: 110px; right: 20px; left: 20px; height: 450px; 
            background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: none; flex-direction: column; z-index: 5000; overflow: hidden;
            animation: reveal 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #chat-header { background: #10b981; padding: 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 18px; border-radius: 1.5rem; max-width: 85%; font-size: 14px; font-weight: 600; }
        .user-msg { background: #f1f5f9; align-self: flex-end; color: #1e293b; border-bottom-right-radius: 0.5rem; }
        .ai-msg { background: #10b981; color: white; align-self: flex-start; border-bottom-left-radius: 0.5rem; }
        #chat-input-area { padding: 15px 20px; background: #f8fafc; display: flex; gap: 12px; border-top: 1px solid #eee; }
        #chat-input { flex: 1; outline: none; font-size: 15px; font-weight: 600; color: #1e293b; background: transparent; }
        @keyframes reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
      import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
      import { Swiper } from 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs'

      const firebaseConfig = {
        apiKey: "AIzaSyDyAqz5_6-i7xIlPAdMUBhdVCZwV262Prw",
        authDomain: "ridefix-final.firebaseapp.com",
        projectId: "ridefix-final",
        storageBucket: "ridefix-final.firebasestorage.app",
        messagingSenderId: "175554582400",
        appId: "1:175554582400:web:f40c9b80354d6963ab1365"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // --- ChatGPT API Configuration ---
      const OPENAI_KEY = "Sk-proj-1WnFMc154-8IL7i9kUUbJcFHb8BwbYST17UF-FPdozhVx54f4ABWQiP6YASETvYeF2lhzNeo8HT3BlbkFJpYQstn7cDbM8rwhiqHIqU4eCaOgrKnikYCXz9zkzke211XftTx1bEq9V1OeZ03PDYIm8iGz4IA";

      window.toggleChat = function() {
          const win = document.getElementById('chat-window');
          const main = document.getElementById('main-content');
          win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
          main.classList.toggle("blur-content");
      };

      window.sendMessage = async function() {
          const input = document.getElementById('chat-input');
          const container = document.getElementById('chat-messages');
          const text = input.value.trim();
          if (!text) return;

          container.innerHTML += `<div class="msg user-msg">${text}</div>`;
          input.value = "";
          container.scrollTop = container.scrollHeight;

          try {
              const response = await fetch("https://api.openai.com/v1/chat/completions", {
                  method: "POST",
                  headers: {
                      "Authorization": `Bearer ${OPENAI_KEY}`,
                      "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                      model: "gpt-3.5-turbo",
                      messages: [
                          { role: "system", content: "You are RideFix AI Support. Short answers in Marathi or English." },
                          { role: "user", content: text }
                      ]
                  })
              });
              const data = await response.json();
              const aiMsg = data.choices[0].message.content;
              container.innerHTML += `<div class="msg ai-msg">${aiMsg}</div>`;
              container.scrollTop = container.scrollHeight;
          } catch (e) {
              container.innerHTML += `<div class="msg ai-msg">Technical issue. Host on GitHub/HTTPS for best results!</div>`;
          }
      };

      // --- Pure English Location Logic ---
      window.updateLocation = function() {
          const locText = document.getElementById("loc-display");
          if (navigator.geolocation) {
              navigator.geolocation.getCurrentPosition(async (pos) => {
                  try {
                      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&accept-language=en`);
                      const data = await res.json();
                      const filterEng = (t) => t ? t.replace(/[^\x00-\x7F]+/g, "").replace(/Taluka|District|taluka|district/gi, "").trim() : "";
                      const village = filterEng(data.address.village || data.address.suburb || data.address.town);
                      const county = filterEng(data.address.county || data.address.state_district);
                      locText.innerText = [village, county, data.address.state].filter(p => p && p.length > 1).join(', ') || "Location Found";
                  } catch (e) { locText.innerText = "Location Found"; }
              });
          }
      };

      onSnapshot(collection(db, "banners"), (snap) => {
          const wrapper = document.getElementById("banner-wrapper");
          wrapper.innerHTML = "";
          snap.forEach(doc => wrapper.innerHTML += `<div class="swiper-slide aspect-[16/9]"><img src="${doc.data().image}"></div>`);
          new Swiper('.mySwiper', { loop: true, autoplay: { delay: 2500 }, pagination: { el: '.swiper-pagination' } });
      });

      onSnapshot(collection(db, "services"), (snap) => {
          const grid = document.getElementById("services-grid");
          grid.innerHTML = "";
          snap.forEach(doc => {
              const s = doc.data();
              grid.innerHTML += `<div class="bg-white rounded-[2.2rem] border p-2 shadow-sm"><div class="h-[125px] overflow-hidden rounded-[1.8rem]"><img src="${s.image}" class="w-full h-full object-cover"></div><p class="text-center font-bold text-[13px] py-4 text-slate-800">${s.name}</p></div>`;
          });
      });

      window.addEventListener('load', updateLocation);
    </script>
</head>
<body>
    <div class="max-w-[450px] mx-auto bg-white min-h-screen relative">
        <div class="ios-header p-6 fixed top-0 left-0 right-0 z-[1000] max-w-[450px] mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-3xl font-black text-white">Ride<span class="text-emerald-500">Fix</span></h1>
                    <p id="loc-display" class="text-emerald-400 text-[11px] font-bold">Finding Location...</p>
                </div>
                <button class="w-11 h-11 bg-white/10 rounded-full flex items-center justify-center text-white"><i data-lucide="bell"></i></button>
            </div>
            <div class="relative"><i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-white/40"></i><input type="text" placeholder="Search..." class="w-full bg-white/10 py-4 pl-12 rounded-[1.4rem] outline-none text-white"></div>
        </div>

        <div id="main-content">
            <div class="pt-[185px] bg-black">
                <div class="swiper mySwiper w-full"><div class="swiper-wrapper" id="banner-wrapper"></div><div class="swiper-pagination"></div></div>
            </div>
            <div class="bg-[#f2f2f7] -mt-6 relative z-20 rounded-t-[2.5rem] pt-10 px-6 pb-32">
                <div id="services-grid" class="grid grid-cols-2 gap-5"></div>
            </div>
        </div>

        <div id="chat-window">
            <div id="chat-header"><span>RideFix AI</span><button onclick="toggleChat()"><i data-lucide="x"></i></button></div>
            <div id="chat-messages"><div class="msg ai-msg">नमस्ते! मी कशी मदत करू शकतो?</div></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="bg-emerald-500 p-2 rounded-full text-white"><i data-lucide="send"></i></button>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-[450px] mx-auto bg-white border-t px-8 py-6 flex justify-between z-[1500]">
            <i data-lucide="home"></i>
            <div onclick="toggleChat()" class="bg-black p-3 rounded-2xl -mt-10"><i data-lucide="message-square" class="text-white"></i></div>
            <i data-lucide="user"></i>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
