<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ridefix - Customer & Admin View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0fdf4; }
        ::-webkit-scrollbar { display: none; }
        .banner-gradient { background: linear-gradient(135deg, #059669 0%, #0d9488 100%); }
    </style>
</head>
<body class="text-slate-800">

    <div class="max-w-[450px] mx-auto bg-white min-h-screen pb-28 shadow-2xl relative border-x border-emerald-50">
        
        <div class="p-5 bg-white sticky top-0 z-50 shadow-sm">
            <div class="flex justify-between items-start mb-4">
                <div class="flex items-start gap-2">
                    <div class="text-emerald-600 mt-1">
                        <i data-lucide="map-pin" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">तुमचे लोकेशन</span>
                        <p id="customer-location-view" class="text-slate-700 text-sm font-bold truncate w-48 italic">शोधत आहे...</p>
                    </div>
                </div>
                <button class="relative p-2.5 bg-emerald-50 rounded-2xl text-emerald-700">
                    <i data-lucide="bell" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <div class="px-5 mt-6 mb-8">
            <div class="relative w-full h-44 banner-gradient rounded-[2.5rem] overflow-hidden shadow-xl shadow-emerald-100">
                <div class="absolute inset-0 p-7 flex flex-col justify-center z-10">
                    <h2 class="text-white text-2xl font-black leading-tight">
                        Professional <br><span class="text-yellow-400">Bike & Car Service</span>
                    </h2>
                    <p class="text-emerald-100 text-[10px] mt-3 font-medium">तुमच्या गावात उपलब्ध</p>
                </div>
            </div>
        </div>

        <div class="px-5">
            <h3 class="font-extrabold text-lg text-slate-800 mb-6">आमच्या सेवा</h3>
            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="bg-emerald-50/50 p-6 rounded-[3xl] border border-emerald-100">
                    <i data-lucide="bike" class="w-8 h-8 text-emerald-600 mx-auto mb-2"></i>
                    <span class="font-bold text-sm">Bike Service</span>
                </div>
                <div class="bg-emerald-50/50 p-6 rounded-[3xl] border border-emerald-100">
                    <i data-lucide="car" class="w-8 h-8 text-emerald-600 mx-auto mb-2"></i>
                    <span class="font-bold text-sm">Car Wash</span>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-[450px] mx-auto bg-white border-t border-emerald-50 px-6 py-5 flex justify-between items-center z-50">
            <div class="flex flex-col items-center text-emerald-600">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[9px] font-black uppercase">Home</span>
            </div>
            <div class="flex flex-col items-center text-slate-300">
                <i data-lucide="calendar" class="w-6 h-6"></i>
                <span class="text-[9px] font-bold uppercase">Bookings</span>
            </div>
            <div class="flex flex-col items-center text-slate-300">
                <i data-lucide="user" class="w-6 h-6"></i>
                <span class="text-[9px] font-bold uppercase">Profile</span>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function handleLocation() {
            const customerView = document.getElementById("customer-location-view");
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&zoom=18`, {
                        headers: { 'User-Agent': 'RidefixApp/1.0' }
                    })
                    .then(res => res.json())
                    .then(data => {
                        const addr = data.address;
                        // गावाचे किंवा शहराचे नाव निवडणे (रस्ता टाळला आहे)
                        const villageName = addr.village || addr.town || addr.city || addr.suburb || addr.hamlet || "Unknown Area";
                        const district = addr.county || "";

                        // १. ग्राहकाला फक्त गाव आणि जिल्हा दिसेल
                        customerView.innerText = `${villageName}${district ? ', ' + district : ''}`;
                        customerView.classList.add("text-emerald-700");

                        // २. अ‍ॅडमिनसाठी पूर्ण डेटा (हा तुम्ही तुमच्या डेटाबेसमध्ये पाठवू शकता)
                        const adminData = {
                            village: villageName,
                            latitude: lat,
                            longitude: lon,
                            full_address: data.display_name
                        };

                        console.log("--- ADMIN PANEL DATA ---");
                        console.log("Village Name:", adminData.village);
                        console.log("Lat/Lon:", adminData.latitude + ", " + adminData.longitude);
                        console.log("-------------------------");
                        
                        // जर तुम्हाला अ‍ॅडमिनला हा डेटा पाठवायचा असेल, तर इथे API call करू शकता.
                    });
                }, (err) => {
                    customerView.innerText = "Location Error";
                }, { enableHighAccuracy: true });
            }
        }

        window.onload = () => setTimeout(handleLocation, 1000);
    </script>
</body>
</html>
